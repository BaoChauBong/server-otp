<!DOCTYPE html>
<html>
<head>
  <title>OTP Dashboard</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 20px;
    }

    .otp-box {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .otp {
      font-size: 28px;
      font-weight: bold;
      color: green;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>
  <h2>📲 OTP Dashboard (Click để copy)</h2>

  <div id="list"></div>

  <script>
    const API = "http://10.111.201.183:3000";
    const socket = io(API);

    socket.on("new-otp", (data) => {
      render(data, true);
    });

    async function loadInit() {
      const res = await fetch(API + "/api/otp");
      const data = await res.json();
      data.forEach(item => render(item, false));
    }

    function render(item, isNew) {
      const div = document.createElement("div");
      div.className = "otp-box";

      div.innerHTML = `
        <div class="otp">${item.otp || "----"}</div>
        <div>${item.message || ""}</div>
        <div class="meta">
          🏦 ${item.sender} | 🌍 ${item.env} | ⏱ ${new Date(item.time).toLocaleTimeString()}
        </div>
      `;

      // click để copy
      div.onclick = () => {
        navigator.clipboard.writeText(item.otp || "");
        alert("✅ Đã copy OTP: " + item.otp);
      };

      if (isNew) {
        document.getElementById("list").prepend(div);
      } else {
        document.getElementById("list").appendChild(div);
      }
    }

    loadInit();
  </script>
</body>
</html>
