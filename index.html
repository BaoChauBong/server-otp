<!DOCTYPE html>
<html>

<head>
  <title>OTP Realtime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body style="font-family: sans-serif; padding: 20px;">

  <h2>OTP mới nhất</h2>
  <h1 id="otp" style="color: green;">---</h1>

  <h3>Danh sách OTP</h3>
  <ul id="list"></ul>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    const socket = io("https://server-otp-ulbl.onrender.com");

    const otpEl = document.getElementById("otp");
    const listEl = document.getElementById("list");

    // load dữ liệu ban đầu
    socket.on("init-otp", (data) => {
      listEl.innerHTML = "";

      data.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item.otp + " - " + item.time;
        listEl.appendChild(li);
      });

      if (data.length > 0) {
        otpEl.innerText = data[0].otp;
      }
    });

    // khi có OTP mới
    socket.on("new-otp", (data) => {
      // update OTP lớn
      otpEl.innerText = data.otp;

      // thêm vào list
      const li = document.createElement("li");
      li.innerText = data.otp + " - " + data.time;
      li.style.color = "red"; // highlight OTP mới
      listEl.prepend(li);

      // auto copy OTP
      navigator.clipboard.writeText(data.otp);

      // rung nhẹ (mobile)
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }
    });
  </script>

</body>

</html>
